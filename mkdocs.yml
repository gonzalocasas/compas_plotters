site_name: COMPAS Plotters
site_url: https://compas.dev/compas_plotters
repo_url: https://github.com/compas-dev/compas_plotters
repo_name: compas-dev/compas_plotters
edit_uri: blob/main/docs/

copyright: Copyright &copy; 2017-2026, ETH Zurich

exclude_docs: |
  conftest.py
  **/__pycache__/
  **/*.pyc

extra:
  homepage: https://compas.dev/compas_plotters
  version:
    provider: mike

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: _logo/compas_logo_white_transparent.png
  favicon: _logo/favicon.ico
  features:
    - content.code.copy
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - assets/stylesheets/custom.css

markdown_extensions:
  - abbr
  - attr_list
  - admonition
  - footnotes
  - md_in_html
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
  - toc:
      permalink: "¤"
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://compas.dev/compas/latest/objects.inv
          options:
            docstring_options:
              ignore_init_summary: true
              trim_doctest_flags: true
            docstring_style: numpy
            docstring_section_style: list
            filters: public
            group_by_category: true
            heading_level: 2
            inherited_members: true
            line_length: 88
            merge_init_into_class: true
            modernize_annotations: true
            parameter_headings: false
            relative_crossrefs: true
            scoped_crossrefs: true
            separate_signature: true
            show_bases: false
            show_root_heading: true
            show_root_full_path: true
            show_signature: true
            show_signature_annotations: true
            show_source: false
            show_submodules: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            summary:
              modules: false
            unwrap_annotated: true
  - print-site

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorial: tutorial.md
  - API Reference:
      - api/index.md
      - compas_plotters: api/compas_plotters.md
      - compas_plotters.scene: api/compas_plotters.scene.md
  - Changelog: changelog.md
  - License: license.md
